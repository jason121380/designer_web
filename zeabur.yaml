apiVersion: zeabur.com/v1
kind: ZeaburSpec
metadata:
  name: designer-web
spec:
  services:
    - name: designer-web
      template: NODEJS
      spec:
        source:
          type: GITHUB
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          - key: DATABASE_URL
            ref:
              service: postgresql
              variable: POSTGRESQL_URI
          - key: AUTH_SECRET
            value: ${AUTH_SECRET}
          - key: NEXTAUTH_URL
            value: ${ZEABUR_WEB_URL}
          - key: SITE_URL
            value: ${ZEABUR_WEB_URL}
          - key: NODE_ENV
            value: production
        # 圖片一律走 Cloudflare R2、影片走 Cloudflare Stream，皆不寫本機磁碟，
        # 因此不再掛載 Volume（R2 五個環境變數在 Zeabur 設定）。
        commands:
          build:
            - npm install
            - npx prisma generate
            - npx prisma migrate deploy
            - npm run build
          start:
            - npm start

    - name: postgresql
      template: POSTGRESQL

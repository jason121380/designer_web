apiVersion: zeabur.com/v1
kind: ZeaburSpec
metadata:
  name: luxe-magazine
spec:
  services:
    - name: luxe-magazine
      template: NODEJS
      spec:
        source:
          type: GITHUB
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          - key: DATABASE_URL
            ref:
              service: postgresql
              variable: POSTGRESQL_URI
          - key: AUTH_SECRET
            value: ${AUTH_SECRET}
          - key: NEXTAUTH_URL
            value: ${ZEABUR_WEB_URL}
          - key: SITE_URL
            value: ${ZEABUR_WEB_URL}
          - key: NODE_ENV
            value: production
          - key: OPENAI_API_KEY
            value: ${OPENAI_API_KEY}
        volumes:
          - id: uploads
            # Zeabur runtime cwd = /src（不是 /app）。上傳/在地化圖片寫在
            # process.cwd()/public/uploads = /src/public/uploads，由
            # app/uploads/[...path]/route.ts 串流服務。Volume 必須掛在這裡，
            # 掛 /app/... 會完全無效（程式讀不到 → 全站破圖）。詳見 CLAUDE.md。
            dir: /src/public/uploads
        commands:
          build:
            - npm install
            - npx prisma generate
            - npx prisma migrate deploy
            - npm run build
          start:
            - npm start

    - name: postgresql
      template: POSTGRESQL
